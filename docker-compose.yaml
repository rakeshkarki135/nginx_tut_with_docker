services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certs:/etc/nginx/certs

    depends_on:
      - frontend
      - backend1
      - backend2
      - backend3

  frontend:
    image: rakeshkarki/frontend:latest
    expose:
      - "3000"
  
  backend1:
    image: rakeshkarki/backend:latest
    expose:
      - "5555"

  backend2:
    image: rakeshkarki/backend:latest
    expose: 
      - "5555"
 
  backend3:
     image: rakeshkarki/backend:latest
     expose:
       - "5555"
